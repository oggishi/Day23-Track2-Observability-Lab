global:
  resolve_timeout: 1m
  # The entrypoint in docker-compose.yml writes $SLACK_WEBHOOK_URL into this
  # file at container start. Alertmanager reads it lazily at notify time, so
  # the stack boots even before a real webhook is set. Alertmanager does NOT
  # expand {{ env }} inside api_url, hence the file approach.
  slack_api_url_file: /tmp/slack_url

route:
  receiver: 'slack-default'
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'slack-critical'
      continue: true
    - matchers:
        - severity = "warning"
      receiver: 'slack-default'

receivers:
  - name: 'slack-default'
    slack_configs:
      - channel: '#observability'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

  - name: 'slack-critical'
    slack_configs:
      - channel: '#oncall'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

inhibit_rules:
  # If the whole service is down, don't also page about latency on it.
  - source_matchers: [alertname = "ServiceDown"]
    target_matchers: [severity = "warning"]
    equal: [service]
